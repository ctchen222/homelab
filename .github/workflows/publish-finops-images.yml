name: Publish FinOps Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish for both FinOps images.
        required: true
        default: 0.1.0
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-finops-images.yml
      - apps/finops-assistant/**
      - jobs/market-research/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    name: Build and publish FinOps images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: finops-assistant
            context: apps/finops-assistant
            dockerfile: apps/finops-assistant/Dockerfile
          - image: finops-market-research
            context: jobs/market-research
            dockerfile: jobs/market-research/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="main-${GITHUB_SHA}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.image-tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Verify published image tag exists
        shell: bash
        run: |
          image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.image-tag.outputs.tag }}"
          docker buildx imagetools inspect "${image_ref}" >/tmp/imagetools.out
          echo "Verified: ${image_ref}"
          echo "--------------------------------------------------"
          cat /tmp/imagetools.out
