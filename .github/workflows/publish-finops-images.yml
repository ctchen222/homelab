name: Publish FinOps Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish for both FinOps images.
        required: true
        default: 0.1.0
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-finops-images.yml
      - apps/finops-assistant/**
      - jobs/market-research/**

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    name: Build and publish FinOps images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: finops-assistant
            context: apps/finops-assistant
            dockerfile: apps/finops-assistant/Dockerfile
          - image: finops-market-research
            context: jobs/market-research
            dockerfile: jobs/market-research/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="main-${GITHUB_SHA}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Verify published image tag exists
        shell: bash
        run: |
          image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.image-tag.outputs.tag }}"
          docker buildx imagetools inspect "${image_ref}" >/tmp/imagetools.out
          echo "Verified: ${image_ref}"
          echo "--------------------------------------------------"
          cat /tmp/imagetools.out

  update-gitops-image-tags:
    name: Commit GitOps image tags
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update production image tags
        env:
          IMAGE_TAG: main-${{ github.sha }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("charts/finops-workspace/values-prod.yaml")
          image_tag = os.environ["IMAGE_TAG"]
          lines = path.read_text().splitlines()

          sections = {"assistant", "marketResearch"}
          updated = set()
          current_section = None
          in_image = False

          for index, line in enumerate(lines):
              if line and not line.startswith(" "):
                  current_section = line[:-1] if line.endswith(":") else None
                  in_image = False
                  continue

              if current_section in sections and re.match(r"^  image:\s*$", line):
                  in_image = True
                  continue

              if in_image and re.match(r"^    tag:\s*", line):
                  lines[index] = f'    tag: "{image_tag}"'
                  updated.add(current_section)
                  in_image = False

          missing = sections - updated
          if missing:
              raise SystemExit(f"Failed to update image tags for: {', '.join(sorted(missing))}")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit updated image tags to main
        shell: bash
        run: |
          if git diff --quiet -- charts/finops-workspace/values-prod.yaml; then
            echo "No image tag changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/finops-workspace/values-prod.yaml
          git commit -m "chore(finops): update production image tags"
          git push origin HEAD:main
