{{- if .Values.wealthfolio.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "finops.fullname" . }}-wealthfolio
  labels:
    {{- include "finops.labels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.global.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.wealthfolio.persistence.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finops.fullname" . }}-wealthfolio
  labels:
    {{- include "finops.labels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "finops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: wealthfolio
  template:
    metadata:
      labels:
        {{- include "finops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: wealthfolio
    spec:
      containers:
        - name: wealthfolio
          image: "{{ .Values.wealthfolio.image.repository }}:{{ .Values.wealthfolio.image.tag }}"
          imagePullPolicy: {{ .Values.wealthfolio.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8088
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            - name: WF_LISTEN_ADDR
              value: 0.0.0.0:8088
            - name: WF_DB_PATH
              value: /data/wealthfolio.db
            - name: WF_AUTH_REQUIRED
              value: {{ .Values.wealthfolio.authRequired | quote }}
            - name: WF_CORS_ALLOW_ORIGINS
              value: {{ .Values.wealthfolio.corsAllowOrigins | quote }}
            - name: WF_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "finops.secretName" . }}
                  key: wealthfolio-secret-key
            {{- if .Values.wealthfolio.authRequired }}
            - name: WF_AUTH_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "finops.secretName" . }}
                  key: wealthfolio-auth-password-hash
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.wealthfolio.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "finops.fullname" . }}-wealthfolio
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "finops.fullname" . }}-wealthfolio
  labels:
    {{- include "finops.labels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
spec:
  selector:
    {{- include "finops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
  ports:
    - name: http
      port: {{ .Values.wealthfolio.service.port }}
      targetPort: http
---
{{- if .Values.wealthfolio.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "finops.fullname" . }}-wealthfolio
  labels:
    {{- include "finops.labels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
  annotations:
    {{- include "finops.privateAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.global.ingressClassName }}
  rules:
    - host: {{ .Values.wealthfolio.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "finops.fullname" . }}-wealthfolio
                port:
                  name: http
{{- end }}
{{- if .Values.wealthfolio.ingressRoute.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "finops.fullname" . }}-wealthfolio-ui
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "finops.labels" . | nindent 4 }}
    app.kubernetes.io/component: wealthfolio
spec:
  entryPoints:
    - {{ .Values.wealthfolio.ingressRoute.entryPoint }}
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      {{- if .Values.global.privateAccess.enabled }}
      middlewares:
        - name: finops-private-access
          namespace: {{ .Values.global.namespace }}
      {{- end }}
      services:
        - name: {{ include "finops.fullname" . }}-wealthfolio
          port: {{ .Values.wealthfolio.service.port }}
{{- end }}
{{- end }}
