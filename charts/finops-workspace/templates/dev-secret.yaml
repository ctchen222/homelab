{{- if .Values.global.createDevSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finops.secretName" . }}
  labels:
    {{- include "finops.labels" . | nindent 4 }}
type: Opaque
stringData:
  telegram-bot-token: local-dev-token
  telegram-webhook-secret: local-dev-webhook-secret
  telegram-allowed-user-ids: "123456789"
  ezbookkeeping-api-token: local-dev-ezbookkeeping-api-token
  ezbookkeeping-secret-key: local-dev-ezbookkeeping-secret-key-change-me
  assistant-internal-token: local-dev-internal-token
  wealthfolio-secret-key: local-dev-wealthfolio-key-123456
  wealthfolio-auth-password-hash: local-dev-password-hash
  market-data-api-token: ""
  llm-api-key: ""
  portfolio-account-identity-salt: local-dev-portfolio-salt
  sinopac-api-key: ""
  sinopac-secret-key: ""
  sinopac-ca-path: "/run/secrets/sinopac/sinopac_API_credential.pfx"
  sinopac-ca-password: ""
  sinopac-ca-pfx: ""
  sinopac-person-id: ""
  firstrade-plaid-client-id: ""
  firstrade-plaid-secret: ""
  firstrade-access-token: ""
  wealthfolio-import-token: ""
{{- end }}
